<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mette Frederiksen Smiler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #c0392b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
    }

    .subtitle {
      color: #ffd7d7;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .face-card {
      background: white;
      border-radius: 30px;
      padding: 40px 50px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: inline-block;
    }

    .face {
      font-size: 130px;
      line-height: 1;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-15px) rotate(3deg); }
    }

    .name-tag {
      margin-top: 20px;
      background: #c0392b;
      color: white;
      border-radius: 12px;
      padding: 10px 24px;
      display: inline-block;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .quote {
      margin-top: 30px;
      color: white;
      font-size: 1.3rem;
      font-style: italic;
      max-width: 480px;
      line-height: 1.6;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
    }

    .flag {
      font-size: 3rem;
      margin-top: 20px;
    }

    button {
      margin-top: 30px;
      background: white;
      color: #c0392b;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 28px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mette Frederiksen</h1>
    <p class="subtitle">Danmarks statsminister</p>

    <div class="face-card">
      <div class="face" id="face">😄</div>
      <div class="name-tag">Mette F.</div>
    </div>

    <p class="quote" id="quote">"God dag, Danmark! I dag er en god dag." 🌟</p>

    <div class="flag">🇩🇰</div>

    <br>
    <button onclick="makeHerSmileMore()">Gør hende endnu gladere!</button>
  </div>

  <script>
    const faces = ['😄','😁','😆','🤩','😍','🥳','😂','😊','🤗','😎'];
    const quotes = [
      '"God dag, Danmark! I dag er en god dag." 🌟',
      '"Vi er alle sammen i det her!" 💪',
      '"Danmark er et fantastisk land!" 🇩🇰',
      '"Hahaha, dette er sjovt!" 😂',
      '"Tak, tak, TAK!" 🙏',
      '"Hold da op, det er dejligt!" ☀️',
    ];
    let i = 0;

    function makeHerSmileMore() {
      i = (i + 1) % faces.length;
      document.getElementById('face').textContent = faces[i];
      document.getElementById('quote').textContent = quotes[i % quotes.length];
    }
  </script>
</body>
</html>
